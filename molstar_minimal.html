<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mol* Minimal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar@latest/build/viewer/molstar.css">
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
        }

        #controls {
            width: 160px;
            flex-shrink: 0;
            background: #1e1e1e;
            padding: 12px;
        }

        #viewer {
            position: relative;   /* Mol* anchors its canvas to this */
            flex: 1;
        }

        button {
            width: 100%;
            padding: 6px 0;
            background: #333;
            color: #eee;
            border: 1px solid #555;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover { background: #444; }
    </style>
</head>
<body>

<div id="controls">
    <button id="toggle-btn">Hide</button>
</div>

<div id="viewer"></div>

<script src="https://cdn.jsdelivr.net/npm/molstar@latest/build/viewer/molstar.js"></script>
<script>
const PDB_FILE   = 'chlorophyll.pdb';
const PDB_FORMAT = 'pdb';

document.addEventListener('DOMContentLoaded', async () => {

    const viewer = await molstar.Viewer.create('viewer', {
        layoutIsExpanded:          false,
        layoutShowControls:        false,
        layoutShowRemoteState:     false,
        layoutShowSequence:        false,
        layoutShowLog:             false,
        layoutShowLeftPanel:       false,
        viewportShowExpand:        false,
        viewportShowSelectionMode: false,
        viewportShowAnimation:     false,
    });

    await viewer.loadStructureFromUrl(PDB_FILE, PDB_FORMAT, false);

    // ── Plugin Commands ───────────────────────────────────────────────────
    //
    // Mol* keeps everything — data downloads, trajectories, structures,
    // components, representations — as nodes in an immutable state tree:
    //
    //   plugin.state.data  (the tree)
    //     └── structure node  (.ref = unique string id)
    //           └── component node  (.ref)   ← your future hide/show targets
    //                 └── representation node  (.ref)
    //
    // PluginCommands are the sanctioned way to mutate the tree.
    // PluginCommands.State.ToggleVisibility flips a node and all its children.
    //
    // The friendly view of the tree is the hierarchy manager:
    //   plugin.managers.structure.hierarchy.current
    //     .structures[]          ← one per loaded file
    //       .components[]        ← sub-selections (chains, residues, elements…)
    //         .representations[] ← cartoon, ball-and-stick, spacefill…
    //
    // Each item's .cell is its live state-tree node.
    // .cell.transform.ref  is the ref string.
    // .cell.state.isHidden is its current visibility.

    const { plugin } = viewer;
    const btn = document.getElementById('toggle-btn');

    btn.addEventListener('click', async () => {
        const structures = plugin.managers.structure.hierarchy.current.structures;
        if (!structures.length) return;

        // Toggle the whole structure node (all components + representations).
        // Swap structures[0] for structures[0].components[i] to toggle a part.
        const ref = structures[0].cell.transform.ref;

        await molstar.PluginCommands.State.ToggleVisibility(plugin, {
            state: plugin.state.data,
            ref,
        });

        const hidden = !!structures[0].cell.state.isHidden;
        btn.textContent = hidden ? 'Show' : 'Hide';
    });

});
</script>
</body>
</html>
