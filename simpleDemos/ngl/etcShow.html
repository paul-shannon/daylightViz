<!DOCTYPE html>
<html>
<head>
  <title>etcShow</title>
  <style>
    * { ox-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: monospace; color: #ccc; display: flex; height: 100vh; }
    #viewport { flex: 1; }
  </style>

  <script src="https://unpkg.com/ngl@2.0.0-dev.37/dist/ngl.js"></script>
</head>

<body>
  <div id="viewport"></div>
  <script>
    const server = "http://127.0.0.1:5519/pdb/"
    var pdbA = "cla-no-tail.pdb"
    var pdbB = "pheophytin-no-tail.pdb"
    var pdbC = "p19-no-tail.pdb"
    var pdbD = "cytochrome-bf6-heme-porphyrin.pdb"
    var pdbE = "3BQV-plastocyanin.pdb"
    var pdbSun = "sun.pdb"
    
    const DEG = Math.PI / 180;

    document.addEventListener("DOMContentLoaded", async () => {
      const stage = new NGL.Stage("viewport", { backgroundColor: "black" });
      window.stage = stage;
      stage.mouseControls.remove("clickPick-left");
      window.addEventListener("resize", () => stage.handleResize());

      const compA = await stage.loadFile(server + pdbA);
      compA.addRepresentation("ball+stick");

      const PORPHYRIN_RING = ["MG", "CHA","CHB","CHC","CHD", "NA","NB","NC","ND", "C1A","C2A","C3A",
                              "C4A", "C1B","C2B","C3B","C4B", "C1C","C2C","C3C","C4C", "C1D","C2D",
                              "C3D","C4D"].map(n => `.${n}`).join(" or ");
      const excitedRep = compA.addRepresentation("ball+stick", {
        sele: PORPHYRIN_RING,
        colorValue: "#ffee22",   // bright excited-state yellow
        multipleBond: "symmetric"
        });
      excitedRep.setVisibility(false);   // hide now that geometry is built
      window.excitedRep = excitedRep;
        
      compA.setRotation([Math.PI/4.4, 0, 0]);
      compA.setPosition ([20,   -43,   -53.8])

      const compB = await stage.loadFile(server + pdbB)
      compB.addRepresentation("ball+stick");
      compB.setRotation([-Math.PI/8,-Math.PI/4, 0])
      compB.setPosition( [0,       0,  2.12])

      const compC = await stage.loadFile(server + pdbC)
      compC.addRepresentation("ball+stick");
      compC.setRotation([-37*DEG,120*DEG,20*DEG])
      compC.setPosition([16,-20,15])

      const compD = await stage.loadFile(server + pdbD)
      compD.addRepresentation("ball+stick")
      compD.setPosition([-147, -205, -178])
      compD.setRotation([0, -70*DEG, -10*DEG])

      const compE = await stage.loadFile(server + pdbE)
      compE.addRepresentation("ribbon", {color: "residueIndex"})
      window.cu = compE.addRepresentation("spacefill", {sele: "CU"})
      compE.setPosition([40,-80,8])        
      compE.setRotation([0*DEG, 270*DEG, 40*DEG])

      const compSun = await stage.loadFile(server + pdbSun)
      compSun.addRepresentation("spacefill",
                                {color: "yellow",
                                 radiusScale: 0.5})
      compSun.setPosition([60,0,0])     

      window.A = compA;
      window.B = compB;
      window.C = compC;
      window.D = compD;
      window.E = compE;
      window.sun = compSun;

      stage.autoView();

      const canvas = stage.viewer.renderer.domElement;
      canvas.addEventListener('click', function(event){
         const rect = canvas.getBoundingClientRect();
         const x = event.clientX - rect.left;
         const y = event.clientY - rect.top;
         console.log('Canvas coords:', x, y);
         }); // click
      stage.signals.clicked.add(function (pickingProxy) {
        if (pickingProxy && pickingProxy.atom){
          console.log("Coordinates:", pickingProxy.position);
          }
         }); // add

    //------------------------------------------------------------
    function photonTravel(comp, destination, nextOperation){
       let mFrame = 0;
       const mSteps = 100
       startX = comp.getCenter().x + 0; // 0
       startY = comp.getCenter().y - 18.2;// 0
       endX = destination.x
       endY = destination.y
       deltaX = (endX - startX)/mSteps;
       deltaY = (endY - startY)/mSteps;
       var i = 0;
       function step() {
          if (i >= mSteps) {
            complete = true;
            nextOperation()
            return;
            }
          else {
             //console.log(i + ": from " + startX + ", " + startY + " to " + endX + ", " + endY);
             if(i > 80){
                stage.animationControls.zoomMove(comp.getCenter(), -100, 1000)
                setTimeout(function() {stage.viewer.requestRender()},0);
                }
             const newX = startX + (i * deltaX)
             const newY = startY + (i * deltaY)
             //console.log("   step " + i  +  ": " + newX + ", " + newY);
             comp.setPosition([newX, newY, 0]);
             stage.viewer.requestRender();
             setTimeout(step, 100);
             i++;
             } // else
           } // function step
        step()

        console.log("--- leaving photonTravel")
        } // photonTravel
    //------------------------------------------------------------
     window.photonTravel = photonTravel;

    }); // DOMContentLoaded
//--------------------------------------------------------------------------------
function absorbPhoton(){
   excitedRep.setVisibility(true)
   sun.setVisibility(false)
}
window.absorbPhoton = absorbPhoton;
//--------------------------------------------------------------------------------

// Blink sequence: simulates photon absorption → excited state → relaxation.
// Each entry is [visible, durationMs].

    const BLINK_SEQUENCE = [
        [true,  300],  // photon absorbed → excited state
        [false, 150],  // brief dark
        [true,  300],  // vibrational re-excitation
        [false, 150],
        [true,  500],  // longer excited state (energy trapped)
        [false,   0]   // relaxed – done
        ];

function firePhoton() {
   let i = 0;
   var complete = false;
   function step() {
      if (i >= BLINK_SEQUENCE.length) {
         complete = true;
         }
     if(!complete){
        const [visible, delay] = BLINK_SEQUENCE[i++];
        excitedRep.setVisibility(visible);
        stage.viewer.requestRender();
        setTimeout(step, delay);
       }
       }

   step();

} // firePhoton
//--------------------------------------------------------------------------------
const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
async function waitDemo(){
    photonTravel(sun, {x: 40.5, y: -11.7}).then(
     (value) => { console.log("travel good")},
     (error) => { console.log("travel error")});
    console.log("--- travel complete");
    //await sleep(4000); // Pauses execution for 2 seconds
    //firePhoton();
    console.log("Done!");
    }
//--------------------------------------------------------------------------------
function CLA_illuminate()
{
    travel(sun,  firePhoton)
    // firePhoton()

} // energizeCLA
//--------------------------------------------------------------------------------

  </script>
</body>
</html>
