            // Create the word cloud
            function redraw(){
            WordCloud(canvas, {
                list: words.map(item => [item[0], item[1]]), // Extract just word and weight
                gridSize: 10,
                weightFactor: function(freq) {
                    const MIN_PX = 12, MAX_PX = 48;
                    const minF = 1, maxF = 9;
                    const t = (Math.sqrt(freq) - Math.sqrt(minF)) /
                              (Math.sqrt(maxF) - Math.sqrt(minF));
                    return MIN_PX + t * (MAX_PX - MIN_PX);
                },
                // fontFamily: 'Arial, sans-serif',
                backgroundColor: '#f8f9fa',
                hover: function(item, dimension, event) {

                  if (Array.isArray(item)) {

                    // You can add custom logic here, like showing a tooltip in a specific div
                    // document.getElementById("myTooltipBox").innerHTML = item[0] + ': ' + item[1];
                    } else {
                     // The item is null when the cursor leaves a word region
                    console.log('Cursor left a word');
                    }
                  },
                click: function(item, dimension, event) {
                    if (item) {

                        infoPanel.innerHTML = `

                        setTimeout(() => canvas.style.border = '1px solid #ccc', 200);
                    }
                }
            })};
            redraw()

            // Custom mouse-enter detection using canvas hit detection
            // This is a workaround since wordcloud2 doesn't have built-in hover events
            canvas.addEventListener('jjmousemove', function(event) {
                var rect = canvas.getBoundingClientRect();
                var scaleX = canvas.width / rect.width;
                var scaleY = canvas.height / rect.height;
                
                var mouseX = (event.clientX - rect.left) * scaleX;
                var mouseY = (event.clientY - rect.top) * scaleY;
                
                // Use the WordCloud hit detection
                var hit = WordCloud.hitTest(canvas, mouseX, mouseY);
                
                if (hit && hit[0]) {
                    // Mouse is over a word
                    var word = hit[0];
                    var wordData = words.find(w => w[0] === word);
                    
                    // Update info panel with hover info
                    infoPanel.innerHTML = `
                        <strong>Hovering over:</strong> ${word}<br>
                        <strong>Category:</strong> ${wordData ? wordData[2].category : 'unknown'}<br>
                        <em>Click for more details or custom action</em>
                    `;
                    
                    // Change cursor to pointer
                    canvas.style.cursor = 'pointer';
                } else {
                    // Mouse is not over a word
                    canvas.style.cursor = 'default';
                }
            });

      let scale = 1;
      const ZOOM_FACTOR = 1.1; // Amount to zoom per scroll
      function handleMouseWheel(event) {
         event.preventDefault();
         const rect = canvas.getBoundingClientRect();
         const mouseX = event.clientX - rect.left;
         const mouseY = event.clientY - rect.top;
         ctx.translate(mouseX, mouseY);
         const delta = event.deltaY < 0 ? ZOOM_FACTOR : 1 / ZOOM_FACTOR;
         ctx.scale(delta, delta);
         scale *= delta;
         ctx.translate(-mouseX, -mouseY);
         drawScene();
      };
      function drawScene() {
         console.log("drawing scene")
         ctx.save();
         ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform to clear the whole canvas
         ctx.clearRect(0, 0, canvas.width, canvas.height);
         ctx.restore(); // Restore the saved transform
          redraw()
         };

                var scaleY = canvas.height / rect.height;
