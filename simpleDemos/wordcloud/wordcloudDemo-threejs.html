      top: 18px;
      left: 50%;
      transform: translateX(-50%);

      font-size: 2rem;

      margin-bottom: 20px;
      letter-spacing: 0.05em;

      border-radius: 6px;

      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    #close-dialog:hover { background: rgba(201,209,217,0.2); }

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;

    // ── Fibonacci sphere point distribution ──────────────────────────────────
    const RADIUS = 110;

    function fibonacciSphere(n, r) {
      const phi = (1 + Math.sqrt(5)) / 2;
      return Array.from({ length: n }, (_, i) => {
        const theta = Math.acos(1 - 2 * (i + 0.5) / n);
        const angle = 2 * Math.PI * i / phi;
        return new THREE.Vector3(
          r * Math.sin(theta) * Math.cos(angle),
          r * Math.sin(theta) * Math.sin(angle),
          r * Math.cos(theta)
        );
      });
    }

    // ── Frequency → visual mappings ──────────────────────────────────────────
    const freqs  = words.map(w => w.freq);
    const minF   = Math.min(...freqs);
    const maxF   = Math.max(...freqs);

    function freqToSize(f) {
      // sqrt scale keeps low-frequency words legible
      const t = (Math.sqrt(f) - Math.sqrt(minF)) /
                (Math.sqrt(maxF) - Math.sqrt(minF) || 1);
      //return 3.5 + t * 16;          // 3.5 → 19.5 Three.js units
      return 1.5 + t * 16;          // 3.5 → 19.5 Three.js units
    }

    function freqToColor(f) {
      const t = (f - minF) / (maxF - minF || 1);
      // cool blue-cyan (low) → warm amber (high)
      const h = 0.58 - t * 0.38;    // 0.58 (blue) down to 0.20 (yellow-amber)
      const s = 0.75;
      const l = 0.52 + t * 0.18;
      return '#' + new THREE.Color().setHSL(h, s, l).getHexString();
    }

    // ── Build word meshes on sphere ──────────────────────────────────────────
    // Sort highest-freq first so they land at index 0, which maps to the front
    // pole of the Fibonacci sphere (z ≈ +RADIUS, closest to camera).
    words.sort((a, b) => b.freq - a.freq);

    const positions = fibonacciSphere(words.length, RADIUS);
    const outward   = new THREE.Vector3();

    words.forEach(({ word, freq }, i) => {
      const mesh = new Text();
      mesh.text     = word;
      mesh.fontSize = freqToSize(freq);
      mesh.color    = freqToColor(freq);
      mesh.anchorX  = 'center';
      mesh.anchorY  = 'middle';
      // Full NotoSans-Regular TTF (not a subset) — covers IPA Extensions,
      // Latin Ext-A/B, Spacing Modifiers, and Combining Diacritical Marks
      mesh.font = 'https://cdn.jsdelivr.net/gh/googlefonts/noto-fonts/hinted/ttf/NotoSans/NotoSans-Regular.ttf';

      mesh.position.copy(positions[i]);

      // Face outward from sphere center so the text is readable from outside
      outward.copy(positions[i]).multiplyScalar(2);
      mesh.lookAt(outward);

      mesh.sync();
      scene.add(mesh);
    });

    // ── Hover highlight + click handler ─────────────────────────────────────
    const raycaster  = new THREE.Raycaster();
    const pointer    = new THREE.Vector2();
    let   hoveredMesh = null;

    function ndcFromEvent(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      pointer.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
    }

    renderer.domElement.addEventListener('mousemove', (e) => {
      ndcFromEvent(e);
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(scene.children, false);
      const hit  = hits.length > 0 ? hits[0].object : null;

      if (hit !== hoveredMesh) {
        if (hoveredMesh) {
          hoveredMesh.color = hoveredMesh.userData.origColor;
          hoveredMesh.scale.setScalar(1);
          hoveredMesh.sync();
        }
        hoveredMesh = hit;
        if (hoveredMesh) {
          hoveredMesh.userData.origColor = hoveredMesh.color;
          hoveredMesh.color = '#ffffff';
          hoveredMesh.scale.setScalar(1.15);
          hoveredMesh.sync();
        }
        renderer.domElement.style.cursor = hoveredMesh ? 'pointer' : 'default';
      }
    });

    renderer.domElement.addEventListener('click', (e) => {
      ndcFromEvent(e);
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(scene.children, false);
      if (hits.length > 0) showWordDialog(hits[0].object.text);
    });

    // ── Subtle depth-fog to reinforce the 3D sphere shape ────────────────────
    scene.fog = new THREE.FogExp2(0x0d1117, 0.003);

    // ── Animation loop ───────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // ── Resize handler ───────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
