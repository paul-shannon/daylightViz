<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Word Cloud — Lushootseed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Sans', 'Segoe UI', Arial, sans-serif;
      user-select: none;
    }
    h1 {
      color: rgba(201,209,217,0.55);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    canvas { display: block; cursor: grab; border-radius: 8px; }
    canvas:active { cursor: grabbing; }
    #hint {
      margin-top: 8px;
      color: rgba(201,209,217,0.25);
      font-size: 12px;
      letter-spacing: 0.05em;
    }
  </style>
  <!-- Noto Sans for IPA/combining-diacritic coverage -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <h1>Lushootseed Word Frequencies</h1>
  <canvas id="c" width="800" height="580"></canvas>
  <div id="hint">drag to rotate &nbsp;·&nbsp; auto-rotating</div>

  <script>
    // ── Data ─────────────────────────────────────────────────────────────────
    const DATA = [
      { word: "•al",           freq: 1 },
      { word: "•ul̓gʷədxʷ",    freq: 1 },
      { word: "c̓agʷa",        freq: 1 },
      { word: "čal(a)",        freq: 1 },
      { word: "cut",           freq: 1 },
      { word: "əlgʷəʔ",        freq: 1 },
      { word: "had",           freq: 1 },
      { word: "hagʷ",          freq: 1 },
      { word: "hay",           freq: 1 },
      { word: "ič",            freq: 1 },
      { word: "ləgʷəb",        freq: 1 },
      { word: "ɬixʷ",          freq: 1 },
      { word: "ƛ̓ub",           freq: 1 },
      { word: "q̓xʷ",           freq: 1 },
      { word: "q̓xʷul̓gʷədxʷ",  freq: 1 },
      { word: "saliʔ",         freq: 1 },
      { word: "siʔ",           freq: 1 },
      { word: "swatixʷtəd",    freq: 1 },
      { word: "t̓əd",           freq: 1 },
      { word: "təlawil",       freq: 1 },
      { word: "xʷəxʷaʔxʷəʔ",  freq: 1 },
      { word: "x̌ʷul̓",         freq: 1 },
      { word: "ʔa",            freq: 1 },
      { word: "ʔacəc",         freq: 1 },
      { word: "ʔaciɬtalbixʷ",  freq: 1 },
      { word: "ʔaʔ",           freq: 1 },
      { word: "ʔuluɬ",         freq: 1 },
      { word: "bəsad",         freq: 2 },
      { word: "bəščəb",        freq: 2 },
      { word: "buus",          freq: 2 },
      { word: "čal",           freq: 2 },
      { word: "cəb",           freq: 2 },
      { word: "č̓it",           freq: 2 },
      { word: "gʷaʔxʷ",        freq: 2 },
      { word: "kʷəd",          freq: 2 },
      { word: "qaw̓qs",         freq: 2 },
      { word: "xʷəʔaʔxʷəʔ",   freq: 2 },
      { word: "haʔkʷ",         freq: 3 },
      { word: "x̌ək̓ʷ",          freq: 3 },
      { word: "ʔal",           freq: 3 },
      { word: "ʔux̌ʷ",          freq: 3 },
      { word: "•abac",         freq: 4 },
      { word: "saxʷəb",        freq: 4 },
      { word: "huyu",          freq: 5 },
      { word: "•gʷiɬ",         freq: 6 },
      { word: "ƛ̓əlayʔ",        freq: 6 },
      { word: "ləx̌",           freq: 8 },
    ];

    // ── Frequency → visual mappings ──────────────────────────────────────────
    const freqs = DATA.map(d => d.freq);
    const minF  = Math.min(...freqs);
    const maxF  = Math.max(...freqs);

    function tFreq(f) {
      return (Math.sqrt(f) - Math.sqrt(minF)) / (Math.sqrt(maxF) - Math.sqrt(minF) || 1);
    }
    function freqToSize(f) { return 13 + tFreq(f) * 34; }   // 13 → 47 px at radius 1
    function freqToColor(f) {
      const t = tFreq(f);
      const r = Math.round(80  + t * 175);
      const g = Math.round(185 - t * 65);
      const b = Math.round(225 - t * 175);
      return [r, g, b];
    }

    // ── Fibonacci sphere placement ────────────────────────────────────────────
    const RADIUS  = 210;
    const PHI     = (1 + Math.sqrt(5)) / 2;
    const N       = DATA.length;

    // Each tag stores its 3-D unit-sphere position
    const tags = DATA.map(({ word, freq }, i) => {
      const theta = Math.acos(1 - 2 * (i + 0.5) / N);
      const angle = 2 * Math.PI * i / PHI;
      return {
        word, freq,
        x: Math.sin(theta) * Math.cos(angle),
        y: Math.sin(theta) * Math.sin(angle),
        z: Math.cos(theta),
        size:  freqToSize(freq),
        color: freqToColor(freq),
      };
    });

    // ── Canvas & rendering ───────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const CX     = canvas.width  / 2;
    const CY     = canvas.height / 2;
    const FL     = 500;  // focal length for perspective

    function project(x, y, z) {
      // perspective divide; z is in [-1,1] on sphere, scaled by RADIUS
      const scale = FL / (FL + z * RADIUS);
      return { sx: CX + x * RADIUS * scale, sy: CY - y * RADIUS * scale, scale };
    }

    function drawFrame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Sort back-to-front so nearer words paint over farther ones
      const sorted = tags.slice().sort((a, b) => a.z - b.z);

      for (const t of sorted) {
        const { sx, sy, scale } = project(t.x, t.y, t.z);

        // depth: z in [-1, 1]; map to opacity [0.15, 1.0]
        const depth   = (t.z + 1) / 2;
        const opacity = 0.15 + depth * 0.85;

        const px = t.size * scale;
        const [r, g, b] = t.color;

        ctx.font = `${px}px 'Noto Sans','Segoe UI',Arial,sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.globalAlpha  = opacity;

        // subtle shadow for depth
        ctx.shadowColor  = `rgba(0,0,0,${0.6 * depth})`;
        ctx.shadowBlur   = 4 * scale;

        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillText(t.word, sx, sy);
      }

      ctx.globalAlpha = 1;
      ctx.shadowBlur  = 0;
    }

    // ── Rotation helpers ──────────────────────────────────────────────────────
    function rotateY(tag, a) {
      const cos = Math.cos(a), sin = Math.sin(a);
      const x = tag.x * cos + tag.z * sin;
      const z = -tag.x * sin + tag.z * cos;
      tag.x = x; tag.z = z;
    }
    function rotateX(tag, a) {
      const cos = Math.cos(a), sin = Math.sin(a);
      const y = tag.y * cos - tag.z * sin;
      const z = tag.y * sin + tag.z * cos;
      tag.y = y; tag.z = z;
    }

    // ── Interaction ───────────────────────────────────────────────────────────
    let isDragging = false;
    let lastX = 0, lastY = 0;
    let vx = 0, vy = 0;               // angular velocity (rad/frame)
    const AUTO_SPEED = 0.004;          // auto-rotation speed when idle

    canvas.addEventListener('mousedown', e => {
      isDragging = true;
      lastX = e.clientX; lastY = e.clientY;
      vx = vy = 0;
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      vy = dx * 0.004;   // horizontal drag → Y-axis rotation
      vx = dy * 0.004;   // vertical drag   → X-axis rotation
      tags.forEach(t => { rotateY(t, vy); rotateX(t, vx); });
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    // Touch support
    canvas.addEventListener('touchstart', e => {
      isDragging = true;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      vx = vy = 0;
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - lastX;
      const dy = e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      vy = dx * 0.004;
      vx = dy * 0.004;
      tags.forEach(t => { rotateY(t, vy); rotateX(t, vx); });
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', () => { isDragging = false; });

    // ── Animation loop ────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      if (isDragging) {
        // positions already updated in mousemove
      } else {
        // momentum decay
        vx *= 0.92;
        vy *= 0.92;
        // blend toward auto-rotation
        vy += (AUTO_SPEED - vy) * 0.02;
        tags.forEach(t => { rotateY(t, vy); rotateX(t, vx); });
      }

      drawFrame();
    }

    animate();
  </script>
</body>
</html>
