<!DOCTYPE html>
<html>
<head>
  <title>NGL Move Sphere Demo</title>
  <style>
    body { margin: 0; background: #1a1a2e; }
    #viewport { width: 100vw; height: 100vh; }
  </style>
  <script src="https://unpkg.com/ngl@2.0.0-dev.37/dist/ngl.js"></script>
</head>
<body>
  <div id="viewport"></div>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const stage = new NGL.Stage("viewport", { backgroundColor: "black" });

      // Load 1crn.pdb for context
      const comp = await stage.loadFile("./1crn.pdb");
      comp.addRepresentation("cartoon", { color: "chainname" });
      comp.autoView();

      // Create a shape with a red sphere, arrow, cylinder, and mesh
      function makeShape(spherePos) {
        const shape = new NGL.Shape("myShape");
        shape.addSphere(spherePos, [1, 0, 0], 2.0, "redSphere");
        shape.addArrow([10, 0, 0], [18, 0, 0], [0, 1, 0], 0.5, "arrow");
        shape.addCylinder([10, 5, 0], [10, 12, 0], [0, 0.5, 1], 0.4, "cylinder");
        shape.addMesh(
          [10, -5, 0,  14, -5, 0,  12, -2, 0],  // vertices
          [0, 1, 2],                              // faces
          { color: [0.8, 0.8, 0.2] }
        );
        return shape;
      }

      // Initial sphere position
      let pos = [-10, 0, 0];
      let shapeComp = stage.addComponentFromObject(makeShape(pos));
      shapeComp.addRepresentation("buffer");

      // Programmatically move the sphere across 60 frames
      const steps = 60;
      const startX = -10;
      const endX = 10;
      let frame = 0;

      function animate() {
        if (frame > steps) return;

        const t = frame / steps;
        const newX = startX + (endX - startX) * t;
        const newY = Math.sin(t * Math.PI) * 5;  // arc upward
        pos = [newX, newY, 0];

        // Remove old shape component, add updated one at new position
        stage.removeComponent(shapeComp);
        shapeComp = stage.addComponentFromObject(makeShape(pos));
        shapeComp.addRepresentation("buffer");

        // Update the display
        stage.viewer.requestRender();

        frame++;
        setTimeout(animate, 50);  // ~20fps
      }

      // Start animation after a short delay so the molecule loads visibly
      setTimeout(animate, 1000);
    });
  </script>
</body>
</html>
