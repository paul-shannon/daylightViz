<!DOCTYPE html>
<html>
<head>
  <title>etcDemo</title>
  <style>
    * { ox-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: monospace; color: #ccc; display: flex; height: 100vh; }
    #viewport { flex: 1; }
  </style>

  <script src="https://unpkg.com/ngl@2.0.0-dev.37/dist/ngl.js"></script>
</head>

<body>
  <div id="viewport"></div>
  <script>
    const server = "http://127.0.0.1:5505/pdb/"
    var pdbA = "cla-no-tail.pdb"
    var pdbB = "pheophytin-no-tail.pdb"
    const DEG = Math.PI / 180;

    document.addEventListener("DOMContentLoaded", async () => {
      const stage = new NGL.Stage("viewport", { backgroundColor: "beige" });
      window.stage = stage;
      stage.mouseControls.remove("clickPick-left");
      window.addEventListener("resize", () => stage.handleResize());
      const compA = await stage.loadFile(server + pdbA);
      compA.addRepresentation("ball+stick");
      //compA.setPosition([-12, 0, 0]);
      const compB = await stage.loadFile(server + pdbB)
      compB.addRepresentation("ball+stick");
      //  compB.setPosition([12, 0, 0]);
      window.A = compA;
      window.B = compB;
      compA.setRotation([Math.PI/4.4, 0, 0]);
        // see notes, etcDemo: place pheophyting fla
      compB.setRotation([-Math.PI/8,-Math.PI/4, 0])
      compA.setPosition ([20,   -43,   -53.8])
      B.setPosition( [0,       0,  2.12])
      stage.autoView();

      const canvas = stage.viewer.renderer.domElement;
      canvas.addEventListener('click', function(event){
         const rect = canvas.getBoundingClientRect();
         const x = event.clientX - rect.left;
         const y = event.clientY - rect.top;
         console.log('Canvas coords:', x, y);
         }); // click
      stage.signals.clicked.add(function (pickingProxy) {
        if (pickingProxy && pickingProxy.atom){
          console.log("Coordinates:", pickingProxy.position);
          }
         }); // add
    }); // DOMContentLoaded
  </script>
</body>
</html>
